<app-head></app-head>

<div class="container mt-3 p-2 border border-primary">
  <table class="table">
    <thead>
      <tr>
        <th scope="col">#</th>
        <th scope="col">First</th>
        <th scope="col">Last</th>
        <th scope="col">Handle</th>
        <th scope="col"></th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th scope="row">1</th>
        <td>Mark</td>
        <td>Otto</td>
        <td>@mdo</td>
        <td>
          <button class="btn btn-sm btn-outline-primary" (click)="toggleDetail()">

        </td>
      </tr>
    </tbody>
  </table>
</div>

<app-pagination class="mt-3 p-2"></app-pagination>

@if (showDetail) {
  <app-detail (close)="showDetail = false"></app-detail>
}
